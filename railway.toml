[build]
# Use Dockerfile build strategy
builder = "dockerfile"
# When rootDirectory is set to "server", the path is relative to it
dockerfilePath = "server/Dockerfile"

[deploy]
# Docker container will run the CMD defined in Dockerfile
# So we don't need startCommand if Dockerfile has CMD/ENTRYPOINT
healthcheckPath = "/api/v1/health"
healthcheckTimeout = 100
restartPolicyType = "on_failure"

[service]
# Set the root context to the server directory
rootDirectory = "server"
